name: CI/CD Pipeline - GCP Palomillo

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app-node
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via Bastion a docker-palomillo
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.DOCKER_HOST }} << 'ENDSSH'
              echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io \
                -u ${{ github.actor }} --password-stdin

              docker stop app-palomillo || true
              docker rm app-palomillo   || true

              docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main

              docker run -d \
                --name app-palomillo \
                -p 8080:3000 \
                --restart always \
                ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
            ENDSSH
