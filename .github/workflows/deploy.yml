name: CI/CD Pipeline - GCP Palomillo
on:
  push:
    branches: [ "main" ]
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Deploy a docker-palomillo
        run: |
          ssh -o StrictHostKeyChecking=no \
            -i $HOME/.ssh/github_actions \
            palomillo_flores@10.0.1.4 << 'ENDSSH'
            echo ${{ secrets.CR_PAT }} | docker login ghcr.io -u DdemonXSoulEdge --password-stdin
            docker stop app-palomillo 2>/dev/null
            docker rm app-palomillo 2>/dev/null
            docker pull ghcr.io/ddemonxsouledge/example-node2:main
            docker run -d --name app-palomillo -p 8080:3000 --restart always ghcr.io/ddemonxsouledge/example-node2:main
