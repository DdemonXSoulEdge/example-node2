name: Blue-Green CI/CD Automatico

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/ddemonxsouledge/example-node2:main

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Leer estado actual y calcular objetivo
        id: state
        run: |
          source ~/current_deploy.env
          echo "Color activo: $CURRENT_COLOR"

          if [ "$CURRENT_COLOR" = "blue" ]; then
            TARGET_COLOR="green"
            TARGET_PORT="3000"
          else
            TARGET_COLOR="blue"
            TARGET_PORT="8080"
          fi

          echo "Color objetivo: $TARGET_COLOR en puerto $TARGET_PORT"

          echo "TARGET_COLOR=$TARGET_COLOR" >> $GITHUB_ENV
          echo "TARGET_PORT=$TARGET_PORT" >> $GITHUB_ENV
          echo "CURRENT_COLOR=$CURRENT_COLOR" >> $GITHUB_ENV

      - name: Desplegar imagen en docker-palomillo
        run: |
          ssh -o StrictHostKeyChecking=no \
            -i $HOME/.ssh/github_actions \
            palomillo_flores@10.0.1.4 \
            "echo ${{ secrets.CR_PAT }} | docker login ghcr.io -u DdemonXSoulEdge --password-stdin && \
             docker pull ghcr.io/ddemonxsouledge/example-node2:main && \
             docker stop app-node 2>/dev/null || true && \
             docker stop app-${{ env.TARGET_COLOR }} 2>/dev/null || true && \
             docker rm app-${{ env.TARGET_COLOR }} 2>/dev/null || true && \
             docker run -d --name app-${{ env.TARGET_COLOR }} -p ${{ env.TARGET_PORT }}:3000 --restart always ghcr.io/ddemonxsouledge/example-node2:main"

      - name: Aplicar configuracion Nginx con envsubst
        run: |
          ssh -o StrictHostKeyChecking=no \
            -i $HOME/.ssh/github_actions \
            palomillo_flores@10.0.1.3 \
            "export APP_TARGET_IP=10.0.1.4 && \
             export APP_TARGET_PORT=${{ env.TARGET_PORT }} && \
             export DEPLOYMENT_COLOR=${{ env.TARGET_COLOR }} && \
             envsubst '\${APP_TARGET_IP} \${APP_TARGET_PORT} \${DEPLOYMENT_COLOR}' \
               < /etc/nginx/nginx.conf.template | sudo tee /etc/nginx/conf.d/default.conf > /dev/null && \
             sudo nginx -t && sudo systemctl reload nginx"

      - name: Verificar header del ambiente nuevo
        run: |
          sleep 3
          HEADER=$(curl -sI http://10.0.1.3 | grep -i X-Deployment-Color)
          echo "Header recibido: $HEADER"
          if echo "$HEADER" | grep -qi "${{ env.TARGET_COLOR }}"; then
            echo "Verificacion exitosa - ${{ env.TARGET_COLOR }} esta activo"
          else
            echo "Error - el header no coincide"
            exit 1
          fi

      - name: Actualizar archivo de estado
        run: |
          echo "CURRENT_COLOR=${{ env.TARGET_COLOR }}" > ~/current_deploy.env
          echo "Estado actualizado: ${{ env.TARGET_COLOR }} ahora es productivo"
          cat ~/current_deploy.env
